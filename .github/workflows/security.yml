name: Security & Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  security:
    name: Dependency Security Audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run composer audit
        run: composer audit

  phpcpd:
    name: Copy-Paste Detection
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      # This job failed on every commit for as long as the history shows, on
      # five pairs of Filament resources. That duplication is real but
      # incidental: Publication and Type happen to have the same three columns,
      # so their declarative form and table schemas come out identical. Sharing
      # a base class between them would couple two unrelated domain concepts on
      # a coincidence, and have to be undone the moment either model gains a
      # field. So the correct response to those particular findings was to
      # ignore them — and a gate whose findings are always correctly ignored
      # stops being read at all, which is how this one came to be permanently
      # red without anyone acting on it.
      #
      # Excluding rather than raising --min-lines is the point: lifting the
      # threshold past the largest clone (92 lines) would silently stop the
      # detector noticing duplicated business logic everywhere. Excluding one
      # directory leaves it strict at 30 lines in services, jobs, models and
      # actions, where duplication does indicate a problem — it found 65
      # copy-pasted lines across Person and Family the moment the Filament
      # noise was out of the way.
      #
      # Be clear about the cost, because it is not free and it is not only
      # scaffolding: this drops the scanned corpus by roughly a third, and
      # app/Filament does contain real logic — getEloquentQuery() overrides,
      # query closures, action handlers — which is now unchecked. Duplication
      # in those is the thing this exclusion will miss. Revisit by narrowing
      # the exclusion further if that starts to bite.
      - name: Run phpcpd
        run: |
          # Pinned, and checksummed on download: this job exists to police the
          # supply chain, so it should not itself execute whatever an unpinned
          # URL happens to serve on the day.
          test -f phpcpd.phar || curl -sL https://phar.phpunit.de/phpcpd-6.0.3.phar -o phpcpd.phar
          echo "${PHPCPD_SHA256}  phpcpd.phar" | sha256sum --check --strict
          php phpcpd.phar --min-lines=30 --exclude app/Filament app/
        env:
          PHPCPD_SHA256: 2cbaea7cfda1bb4299d863eb075e977c3f49055dd16d88529fae5150d48a84cb
