apiVersion: v1
kind: Service
metadata:
  name: genealogy-app
  namespace: genealogy
spec:
  selector:
    app: genealogy-app
    component: application
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
---
apiVersion: v1
kind: Service
metadata:
  name: genealogy-reverb
  namespace: genealogy
spec:
  selector:
    app: genealogy-app
    component: reverb
  ports:
    - name: ws
      protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
