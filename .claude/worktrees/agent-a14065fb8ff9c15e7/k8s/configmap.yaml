# ConfigMap for non-sensitive environment variables
# Secrets (APP_KEY, DB_PASSWORD, etc.) are stored separately in secret.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: genealogy-config
  namespace: genealogy
  labels:
    app.kubernetes.io/name: genealogy
    app.kubernetes.io/component: config
data:
  # Application identity and environment
  APP_NAME: "Liberu Genealogy"
  APP_ENV: "production"
  # APP_URL should be overridden at deploy time to match your domain
  APP_URL: "https://genealogy.example.com"
  APP_DEBUG: "false"

  # Logging
  LOG_CHANNEL: "stack"
  LOG_LEVEL: "warning"

  # Database connection type (credentials are in the Secret)
  DB_CONNECTION: "mysql"
  DB_PORT: "3306"

  # Queue, cache, and session — all backed by Redis
  QUEUE_CONNECTION: "redis"
  CACHE_STORE: "redis"
  SESSION_DRIVER: "redis"
  SESSION_LIFETIME: "120"

  # Broadcasting via Reverb
  BROADCAST_DRIVER: "reverb"
  REVERB_PORT: "8080"
  REVERB_SCHEME: "http"

  # Octane / RoadRunner
  OCTANE_SERVER: "roadrunner"
  OCTANE_PORT: "8000"

  # Redis default port (host and password are in the Secret)
  REDIS_PORT: "6379"

  # Mail defaults (override as needed)
  MAIL_MAILER: "log"
  MAIL_FROM_ADDRESS: "noreply@example.com"
  MAIL_FROM_NAME: "Liberu Genealogy"

  # Filament / admin panel
  FILAMENT_FILESYSTEM_DISK: "local"

  # Asset compilation — assets are pre-built in the image
  VITE_APP_NAME: "Liberu Genealogy"
