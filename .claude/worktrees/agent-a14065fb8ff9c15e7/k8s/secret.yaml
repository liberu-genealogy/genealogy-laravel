# Secret template for sensitive environment variables
#
# IMPORTANT: All values below are empty placeholders.
# Before deploying, populate them using one of:
#
#   Option A — kubectl create secret (recommended, keeps values out of YAML):
#     kubectl create secret generic genealogy-secrets \
#       --namespace=genealogy \
#       --from-literal=APP_KEY='base64:YOUR_KEY_HERE' \
#       --from-literal=DB_HOST='mysql-service' \
#       ...
#
#   Option B — Sealed Secrets / External Secrets Operator / Vault Agent:
#     Replace this file with the appropriate CRD and configure your secrets store.
#
#   Option C — Fill values here and encrypt the file (e.g. git-crypt / SOPS).
#     Base64-encode every value before placing it in the `data` block:
#       echo -n 'my-value' | base64
#
# Never commit real secret values to version control.
apiVersion: v1
kind: Secret
metadata:
  name: genealogy-secrets
  namespace: genealogy
  labels:
    app.kubernetes.io/name: genealogy
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # Laravel application key — generate with: php artisan key:generate --show
  # Must be base64-encoded for the `data` block (the value itself is already base64:...)
  APP_KEY: ""

  # MySQL connection details
  DB_HOST: ""
  DB_DATABASE: ""
  DB_USERNAME: ""
  DB_PASSWORD: ""

  # Redis connection details
  REDIS_HOST: ""
  REDIS_PASSWORD: ""

  # Laravel Reverb WebSocket credentials
  # Generate with: php artisan reverb:install or from Reverb dashboard
  REVERB_APP_ID: ""
  REVERB_APP_KEY: ""
  REVERB_APP_SECRET: ""

  # Laravel Cashier / Stripe billing credentials
  STRIPE_KEY: ""
  STRIPE_SECRET: ""
